# =========================
# DEFAULT (FULL SAUDI FIR)
# =========================
[client_page.configs.OEJD]
include = [
    "OE*",
    "OBBI*"
]
exclude = []
priority = [
    "*_FMP",
    "*_CTR",
    "*_APP",
    "*_TWR",
    "*_GND",
    "*_DEL"
]
frequencies = "ShowAll"
grouping = "FirAndIcao"


